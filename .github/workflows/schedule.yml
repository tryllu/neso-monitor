name: Monitor Stacji Neso

on:
  repository_dispatch:
    types: [run-monitor]
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Pobranie kodu z repozytorium
        uses: actions/checkout@v4

      - name: Instalacja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacja bibliotek
        run: pip install requests beautifulsoup4

      - name: Uruchomienie skryptu
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
        run: python monitor.py

      - name: Zapisanie pliku ze stanem do repozytorium
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add previous_state.json previous_messages.json
          # Commituj i pushuj tylko jeśli plik się zmienił
          git diff --quiet && git diff --staged --quiet || (git commit -m "Zapisano nowy stan stacji" && git push)
