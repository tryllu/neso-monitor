name: Uruchom monitor stacji Neso

on:
  repository_dispatch:
    types: [trigger-monitor]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacja bibliotek
        run: pip install requests beautifulsoup4

      - name: Uruchomienie skryptu
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
        run: python monitor.py

      - name: Zapisanie pliku ze stanem do repozytorium
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add previous_state.json previous_messages.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Zapisano nowy stan stacji i komunikatów" && git push)
